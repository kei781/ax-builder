events {
    worker_connections 1024;
}

http {
    upstream backend {
        server host.docker.internal:4000;
    }

    upstream frontend {
        server host.docker.internal:3123;
    }

    server {
        listen 80;
        server_name localhost;

        # Frontend (development)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket (socket.io)
        # socket.io 클라이언트는 /socket.io/ 경로로 연결함.
        # NestJS의 @WebSocketGateway namespace '/ws'는 socket.io 레벨 개념이고,
        # HTTP 경로는 항상 /socket.io/ 임.
        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Legacy /ws/ path (keep for backward compat)
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }

    # Dynamic project port proxying (3000-3999)
    # Each project runs on its own port, accessible directly
    # No Nginx proxy needed for individual projects in dev mode
}
