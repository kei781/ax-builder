version: '3.8'

# ax-builder Docker Compose
# 플랫폼 DB는 SQLite (설치 불필요)
# 이 파일은 프로젝트 빌드 시 생성되는 컨테이너와 Nginx용입니다.

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    # 개발 시에는 직접 localhost:5173/4000으로 접속해도 됩니다.
    # Nginx를 쓰면 localhost:80 하나로 통합 접속 가능합니다.
    profiles:
      - with-nginx
