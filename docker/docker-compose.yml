version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-axbuilder_dev_password}
      MYSQL_DATABASE: ai_builder
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - mysql
    restart: unless-stopped
    # Nginx는 선택사항입니다.
    # 개발 시에는 직접 localhost:5173 (프론트), localhost:4000 (백엔드)로 접속해도 됩니다.
    # Nginx를 쓰면 localhost:80 하나로 통합 접속 가능합니다.
    profiles:
      - with-nginx

volumes:
  mysql_data:
